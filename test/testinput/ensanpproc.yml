geometry:
  geom_grid_file: data_generated/gridgen/soca_gridspec.72x35x25.nc
  mom6_input_nml: data_static/72x35x25/input.nml
  fields metadata: data_static/fields_metadata.yml

nens: 4
nens per MPI task: 2

increment variables: &vars
- sea_water_potential_temperature
- sea_water_salinity
- eastward_sea_water_velocity
- northward_sea_water_velocity
- sea_ice_area_fraction
- sea_ice_thickness
- sea_ice_snow_thickness
- sea_water_cell_thickness

backgrounds:
  members from template:
    template:
      read_from_file: 1
      date: &date_bkg 2018-04-15T00:00:00Z
      basename: data_static/72x35x25/
      remap_filename: data_static/72x35x25/restarts/MOM.res.nc
      ocn_filename: restarts_ens/MOM.res.ens.%mem%.nc
      ice_filename: restarts_ens/cice.res.ens.%mem%.nc
      state variables: *vars
    pattern: %mem%
    nmembers: 4

ensemble mean output:
  datadir: data_output/
  exp: ensmean
  type: an
  date: *date_bkg

ensemble inflation:
  value: 1.5

recentering state:
  read_from_file: 1
  date: *date_bkg
  basename: data_static/72x35x25/
  ocn_filename: restarts/MOM.res.nc
  ice_filename: restarts/cice.res.nc
  state variables: *vars

output increments:
  datadir: data_output/
  exp: recentered_incr
  type: ens
  date: *date_bkg

increment postprocessing:
  set increment variables to zero:
  - eastward_sea_water_velocity
  - northward_sea_water_velocity
  change precision:
    variables:
    - sea_water_potential_temperature
    - sea_water_salinity
    - sea_ice_area_fraction
    - sea_ice_thickness
    - sea_ice_snow_thickness
    precision: 1.e-5 # precision is set pretty low for test reference comparison purpose only
  append vertical geometry:
    layers variable: sea_water_cell_thickness
    vertical geometry:
      date: *date_bkg
      basename: data_static/72x35x25/
      ocn_filename: restarts/MOM.res.nc
      read_from_file: 3

analysis postprocessing:
  sea ice variable change:
    pattern: "%mem%"
    variable change name: Soca2Cice
    arctic:
      seaice edge: 0.4
      shuffle: true
      rescale prior:
        rescale: true
        min hice: 0.5
        min hsno: 0.1
    antarctic:
      seaice edge: 0.4
      shuffle: true
      rescale prior:
        rescale: true
        min hice: 0.5
        min hsno: 0.1
    cice background state:
      restart: data_static/72x35x25/restarts/iced.2018-04-15-00000.nc
      ncat: 5
      ice_lev: 7
      sno_lev: 1
    cice output:
      restart: data_output/mem.%mem%/iced.2018-04-15-00000.nc
    output variables:
    - sea_water_potential_temperature
    - sea_water_salinity
    - sea_ice_area_fraction
    - sea_ice_thickness
    - sea_ice_snow_thickness

test:
  reference filename: testref/ensanpproc.test
  test output filename: testoutput/ensanpproc.test
  float absolute tolerance: 1e-4
