geometry:
  geom_grid_file: data_generated/gridgen/soca_gridspec.72x35x25.nc
  mom6_input_nml: data_static/72x35x25/input.nml
  fields metadata: data_static/fields_metadata.yml

time window:
  begin: &date 2018-04-14T00:00:00Z
  length: P2D

background:
  members from template:
    template:
      date: 2018-04-15T00:00:00Z
      ocn_filename: MOM.res.ens.%mem%.nc
      read_from_file: 1
      basename: data_static/72x35x25/restarts_ens/
      state variables:
      - sea_water_salinity
      - sea_water_potential_temperature
      - sea_surface_height_above_geoid
      - eastward_sea_water_velocity
      - northward_sea_water_velocity
      - sea_water_cell_thickness
      - mass_concentration_of_chlorophyll_in_sea_water
      - molar_concentration_of_biomass_in_sea_water_in_p_units
    pattern: '%mem%'
    nmembers: 4

observations:
  observers:
  - obs space:
      name: SeaSurfaceTemp
      distribution:
        name: Halo
        halo size: 3500.0e3
      obsdataout:
        engine:
          type: H5File
          obsfile: data_output/sst.nc
      obsdatain:
        engine:
          type: H5File
          obsfile: data_static/obs/sst.nc
      simulated variables: [seaSurfaceTemperature]
    obs operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yml
    obs error:
      covariance model: diagonal
    obs localizations:
    - localization method: Rossby
      base value: 100.0e3
      rossby mult: 1.0
      min grid mult: 2.0
      min value: 200.0e3
      max value: 900.0e3
    obs filters:
    - filter: Domain Check
      where:
      - variable: {name: GeoVaLs/sea_area_fraction}
        minvalue: 0.5
      apply at iterations: 0,1

  - obs space:
      name: ADT
      distribution:
        name: Halo
        halo size: 3500.0e3
      obsdataout:
        engine:
          type: H5File
          obsfile: data_output/adt.nc
      obsdatain:
        engine:
          type: H5File
          obsfile: data_static/obs/adt.nc
      simulated variables: [absoluteDynamicTopography]
    obs operator:
      name: ADT
    obs error:
      covariance model: diagonal
    obs localizations:
    - localization method: Rossby
      base value: 100.0e3
      rossby mult: 1.0
      min grid mult: 2.0
      min value: 200.0e3
      max value: 900.0e3
    obs filters:
    - filter: Domain Check
      where:
      - variable: {name: GeoVaLs/sea_area_fraction}
        minvalue: 0.5
      apply at iterations: 0,1

driver:
  do posterior observer: true
  save posterior mean increment: true
  save posterior mean: true
  save posterior variance: true
  save prior mean: true
  save prior variance: true

local ensemble DA:
  solver: Deterministic GETKF
  vertical localization:
    fraction of retained variance: 0.6
    lengthscale: 50
    lengthscale units: levels
  inflation:
    rtps: 0.5
    rtpp: 0.6
    mult: 1.1

output:
  datadir: data_output/
  date: *date
  exp: getkf
  type: ens

output mean prior:
  datadir: data_output/
  date: *date
  exp: getkf
  type: fc

output variance prior:
  datadir: data_output/
  date: *date
  exp: getkf
  type: fc

output variance posterior:
  datadir: data_output/
  date: *date
  exp: getkf
  type: an

output increment:
  datadir: data_output/
  date: *date
  exp: getkf.inc
  type: an

test:
  reference filename: testref/getkf.test
  test output filename: testoutput/getkf.test
  float relative tolerance: 1e-2
  float absolute tolerance: 1.2e-2
