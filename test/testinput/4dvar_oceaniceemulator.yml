_date_begin: &date_begin 2018-04-15T00:00:00Z
cost function:
  cost type: 4D-Var
  jb evaluation: false
  time window:
    begin: *date_begin
    length: PT6H
  analysis variables: &soca_an_vars
  - sea_ice_area_fraction
  - sea_surface_height_above_geoid

  geometry: &geom
    geom_grid_file: data_generated/gridgen/soca_gridspec.72x35x25.nc
    mom6_input_nml: data_static/72x35x25/input.nml
    fields metadata: data_static/fields_metadata.yml

  model:
    name: ModelOceanIceEmulator
    tstep: PT1H
    model variables: &soca_vars
    - sea_ice_area_fraction
    - sea_surface_height_above_geoid

  background:
    read_from_file: 1
    date: 2018-04-15T00:00:00Z
    basename: data_static/72x35x25/restarts/
    ocn_filename: MOM.res.nc
    ice_filename: cice.res.nc
    state variables: *soca_vars

  background error:
    covariance model: SABER
    saber central block:
      saber block name: diffusion
      read:
        groups:
        - variables:
          - sea_ice_area_fraction
          - sea_surface_height_above_geoid
          horizontal:
            filepath: data_generated/parameters_diffusion/hz_smaller

  observations:
    observers:
    - obs space:
        name: ADT
        obsdataout:
          engine:
            type: H5File
            obsfile: data_output/adt.nc
        obsdatain:
          engine:
            type: H5File
            obsfile: data_static/obs/adt.nc
        simulated variables: [absoluteDynamicTopography]
      obs operator:
        name: ADT
      obs error:
        covariance model: diagonal

    - obs space:
        name: SeaIceFraction
        obsdataout:
          engine:
            type: H5File
            obsfile: data_output/icec.4dvar_oceaniceemulator.nc
        obsdatain:
          engine:
            type: H5File
            obsfile: data_static/obs/icec.nc
        simulated variables: [seaIceFraction]
      obs operator:
        name: Identity
        observation alias file: testinput/obsop_name_map.yml
      obs error:
        covariance model: diagonal

variational:
  minimizer:
    algorithm: RPCG
  iterations:
  - geometry: *geom
    ninner: 2
    gradient norm reduction: 1e-15
    linear model:
      name: LinearModelOceanIceEmulator
      tstep: PT1H
      model variables:
      - sea_ice_area_fraction
      - sea_surface_height_above_geoid
  - geometry: *geom
    ninner: 2
    gradient norm reduction: 1e-15
    linear model:
      name: LinearModelOceanIceEmulator
      tstep: PT1H
      model variables:
      - sea_ice_area_fraction
      - sea_surface_height_above_geoid
final j evaluation: false

test:
  reference filename: testref/4dvar_oceaniceemulator.test
  test output filename: testoutput/4dvar_oceaniceemulator.out
  float relative tolerance: 1e-4
  float absolute tolerance: 1e-4
